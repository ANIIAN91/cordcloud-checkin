name: "CordCloud Action"
description: "GitHub Action for CordCloud"
author: "yanglbme"
branding:
  icon: "check-circle"
  color: "gray-dark"
inputs:
  email:
    description: "your cordcloud email"
    required: true
  passwd:
    description: "your cordcloud password"
    required: true
  secret:
    description: "your TOTP secret for authenticator-based 2FA"
    required: false
  code:
    description: "your one-time verification code for device/email-based 2FA"
    required: false
  verify_method:
    description: "preferred 2FA method: ga or email (default: auto)"
    required: false
  trust_device:
    description: "trust the current device after successful 2FA (default: false)"
    required: false
    default: "false"
  insecure_skip_verify:
    description: "skip TLS certificate verification for debugging only (default: false)"
    required: false
    default: "false"
  host:
    description: "base host"
    required: false
    default: "cordcloud.us,cordcloud.one,cordcloud.biz,c-cloud.xyz"
outputs:
  result:
    description: "The result of api"
runs:
  using: "docker"
  image: "Dockerfile"
